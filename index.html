<!-- V53 Ultra Realism -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simulador de Vuelo Ultraligero - Optimen</title>
<style>
  body { margin:0; overflow:hidden; background:#000; }
  #info { position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);color:#fff;padding:8px 18px;border-radius:8px;font-family:monospace;font-size:14px;z-index:10;pointer-events:none;white-space:nowrap; }
  #hint { position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.55);color:#ddd;padding:6px 16px;border-radius:8px;font-family:monospace;font-size:12px;z-index:10;pointer-events:none;white-space:nowrap; }
  canvas { display:block; }
</style>
</head>
<body>
<div id="info">Velocidad: <span id="spd">0</span> km/h &nbsp;|&nbsp; Altitud: <span id="alt">0</span> m</div>
<div style="position:absolute;top:12px;right:16px;z-index:20;pointer-events:none;color:#ffffff;font-family:Arial Black,Arial;font-size:20px;font-weight:900;letter-spacing:2px;text-shadow:0 0 6px rgba(0,0,0,0.8);">OPTIMEN</div>
<div id="throttle-panel" style="position:absolute;right:20px;top:50%;transform:translateY(-50%);z-index:30;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:auto;">
  <div style="color:#fff;font-family:monospace;font-size:11px;font-weight:bold;text-shadow:0 0 4px #000;">POTENCIA</div>
  <div id="throttle-track" style="width:36px;height:180px;background:rgba(0,0,0,0.7);border:2px solid #555;border-radius:18px;position:relative;cursor:pointer;">
    <!-- Zonas de color -->
    <div style="position:absolute;bottom:0;left:0;right:0;height:50%;background:rgba(0,200,0,0.15);border-radius:0 0 16px 16px;"></div>
    <div style="position:absolute;bottom:50%;left:0;right:0;height:30%;background:rgba(255,200,0,0.15);"></div>
    <div style="position:absolute;bottom:80%;left:0;right:0;height:20%;background:rgba(255,50,0,0.15);border-radius:16px 16px 0 0;"></div>
    <!-- Marcas -->
    <div style="position:absolute;right:-18px;bottom:0;color:#0f0;font-family:monospace;font-size:9px;">0%</div>
    <div style="position:absolute;right:-22px;bottom:48%;color:#ff0;font-family:monospace;font-size:9px;">50%</div>
    <div style="position:absolute;right:-26px;top:0;color:#f44;font-family:monospace;font-size:9px;">100%</div>
    <!-- Palanca -->
    <div id="throttle-handle" style="position:absolute;left:50%;transform:translateX(-50%);bottom:4px;width:28px;height:28px;background:linear-gradient(135deg,#888,#444);border:2px solid #aaa;border-radius:6px;cursor:grab;box-shadow:0 2px 8px rgba(0,0,0,0.7);transition:background 0.2s;"></div>
  </div>
  <div id="throttle-pct" style="color:#0f0;font-family:monospace;font-size:13px;font-weight:bold;text-shadow:0 0 6px #0f0;">0%</div>
  <div style="color:#aaa;font-family:monospace;font-size:9px;">W/S o arrastrar</div>
</div>
<div id="crash-screen" style="display:none;position:absolute;inset:0;background:rgba(180,0,0,0.75);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;">
  <div style="font-size:64px;">💥</div>
  <div style="color:#fff;font-family:monospace;font-size:32px;font-weight:bold;margin:10px 0;">CRASH</div>
  <div style="color:#ffcccc;font-family:monospace;font-size:16px;margin-bottom:24px;">El avión fue destruido</div>
  <button onclick="location.reload()" style="background:#fff;color:#cc0000;border:none;border-radius:10px;padding:12px 32px;font-size:18px;font-weight:bold;cursor:pointer;">↺ Reiniciar</button>
</div>
<button onclick="location.reload()" style="position:absolute;top:12px;left:16px;z-index:30;background:rgba(0,0,0,0.7);color:#fff;border:1px solid #555;border-radius:8px;padding:6px 14px;font-family:monospace;font-size:13px;cursor:pointer;">↺ Reiniciar</button>
<div id="hint">W/S = acelerar/frenar &nbsp;|&nbsp; ↓ sube &nbsp;|&nbsp; ↑ baja &nbsp;|&nbsp; ←→ girar</div>

<div id="fuel" style="position:absolute;top:52px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);color:#0f0;padding:6px 12px;border-radius:8px;font-family:monospace;z-index:20">Combustible: 100%</div>
<div id="msg" style="position:absolute;top:85px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);color:#ff0;padding:6px 12px;border-radius:8px;font-family:monospace;z-index:20"></div>
<canvas id="radar" width="180" height="180" style="position:absolute;right:15px;bottom:15px;border:2px solid #0f0;border-radius:50%;background:rgba(0,0,0,.65);z-index:20"></canvas>
<canvas id="gauges" width="260" height="180" style="position:absolute;left:15px;bottom:15px;background:rgba(0,0,0,.65);border-radius:12px;z-index:25"></canvas><canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.addEventListener('load', function(){
  

  const W = window.innerWidth, H = window.innerHeight;
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
 renderer.shadowMap.enabled = true;
  renderer.setSize(W, H); renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.15; renderer.outputEncoding = THREE.sRGBEncoding; renderer.physicallyCorrectLights = true;
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.Fog(0x87CEEB, 400, 1100);

  const camera = new THREE.PerspectiveCamera(65, W/H, 0.1, 2000);

  const sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
 sun.castShadow = true;
  sun.position.set(80,120,60); sun.castShadow=true; sun.shadow.mapSize.width=2048; sun.shadow.mapSize.height=2048; scene.add(sun);
  scene.add(new THREE.AmbientLight(0xaad4f5, 0.8));

  // Terreno con altura (heightmap manual)
  const terrainW = 200, terrainH = 200;
  const terrainGeo = new THREE.PlaneGeometry(4000, 4000, terrainW, terrainH);
  terrainGeo.rotateX(-Math.PI/2);
  const pos = terrainGeo.attributes.position;

  // Funcion de ruido simple
  function noise(x,z,freq,amp){
    return Math.sin(x*freq)*Math.cos(z*freq*0.8)*amp
         + Math.sin(x*freq*2.1+1)*Math.cos(z*freq*1.7)*amp*0.5
         + Math.sin(x*freq*0.5+2)*Math.cos(z*freq*0.4)*amp*1.5;
  }

  // Zonas de lago — aplanar y hundir
  // Lagos: lejos de zonas planas de ciudades y aeropuertos
  const lakeZones = [
    {x:-350,z:-250,rx:70,rz:45},   // izquierda cercana
    {x:350, z:-250,rx:65,rz:42},   // derecha cercana
    {x:-900,z:-700,rx:80,rz:55},   // lejos izquierda
    {x:900, z:-700,rx:75,rz:50},   // lejos derecha
    {x:0,   z:-550,rx:50,rz:35},   // centro medio
    {x:-500,z:-400,rx:40,rz:28},   // izq medio
    {x:500, z:-400,rx:45,rz:30},   // der medio
  ];

  function inLake(wx, wz){
    for(const l of lakeZones){
      const dx=(wx-l.x)/l.rx, dz=(wz-l.z)/l.rz;
      if(dx*dx+dz*dz < 1.0) return true;
    }
    return false;
  }
  function lakeFade(wx,wz){
    let minD=99;
    for(const l of lakeZones){
      const dx=(wx-l.x)/l.rx, dz=(wz-l.z)/l.rz;
      minD=Math.min(minD, dx*dx+dz*dz);
    }
    return minD;
  }

  // Montañas: en bordes del mapa, lejos de ciudades (x±700,z-1100) y aeropuerto (0,0)
  const mountains = [
    // Cadena norte-izquierda (lejos de ciudad 1)
    {x:-1100,z:-500, h:130,r:230},
    {x:-1200,z:-700, h:100,r:190},
    {x:-1000,z:-300, h:90, r:170},
    // Cadena norte-derecha (lejos de ciudad 2)
    {x:1100, z:-500, h:120,r:220},
    {x:1200, z:-700, h:95, r:185},
    {x:1000, z:-300, h:85, r:165},
    // Fondo del mapa
    {x:-400, z:-1400,h:110,r:210},
    {x:0,    z:-1500,h:95, r:200},
    {x:400,  z:-1400,h:105,r:205},
    // Costados cercanos
    {x:-1100,z:-100, h:80, r:160},
    {x:1100, z:-100, h:75, r:155},
  ];

  function mountainHeight(wx,wz){
    let h=0;
    for(const m of mountains){
      const dx=wx-m.x, dz=wz-m.z;
      const d=Math.sqrt(dx*dx+dz*dz);
      if(d<m.r){
        const t=1-d/m.r;
        // Forma más natural: t^1.5 en vez de cono puro
        h+=m.h*Math.pow(t,1.4)*(0.85+0.15*Math.sin(dx*0.05)*Math.cos(dz*0.05));
      }
    }
    return h;
  }

  for(let i=0;i<pos.count;i++){
    const wx = pos.getX(i);
    const wz = pos.getZ(i);
    const d  = lakeFade(wx,wz);
    if(d < 1.0){
      // Dentro del lago: hundido suavemente
      const blend = Math.max(0, 1-d);
      pos.setY(i, -1 - blend*2);
    } else {
      // Terreno normal con ruido + montañas
      let h = noise(wx,wz,0.008,8) + noise(wx,wz,0.02,3);
      h += mountainHeight(wx,wz);
      // Zona cercana al lago: transición suave
      if(d < 1.5){
        const blend = (d-1.0)/0.5;
        h = h*blend + (-1)*(1-blend);
      }
      // Zona plana: pista de salida + zona ciudad/aeropuerto
      const runwayFlat = Math.abs(wx)<200 && wz>-250 && wz<150;
      const ap0Flat   = Math.abs(wx)<250   && wz>-220  && wz<220;   // aeropuerto inicio
      const city1Flat = Math.abs(wx+700)<280 && wz>-1280 && wz<-880; // ciudad 1 + ap1
      const city2Flat = Math.abs(wx-700)<280 && wz>-1280 && wz<-880; // ciudad 2 + ap2

      if(runwayFlat || ap0Flat || city1Flat || city2Flat){
        h = 0;
      }
      pos.setY(i, h - 1);
    }
  }
  terrainGeo.computeVertexNormals();

  // Color del terreno por altura
  const terrainColors = [];
  for(let i=0;i<pos.count;i++){
    const y = pos.getY(i);
    const wx = pos.getX(i);
    const wz = pos.getZ(i);
    let r,g,b;
    if(inLake(wx,wz)){
      r=0.1; g=0.47; b=0.8; // azul lago
    } else if(y > 55){
      r=0.85; g=0.82; b=0.78; // nieve/roca
    } else if(y > 25){
      r=0.45; g=0.38; b=0.28; // roca marron
    } else if(y > 8){
      r=0.32; g=0.55; b=0.22; // verde oscuro montaña
    } else {
      r=0.30; g=0.62; b=0.18; // verde pradera
    }
    terrainColors.push(r,g,b);
  }
  terrainGeo.setAttribute('color', new THREE.Float32BufferAttribute(terrainColors,3));
  const terrainMat = new THREE.MeshPhongMaterial({vertexColors:true, shininess:8});
  const terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
  terrainMesh.receiveShadow = true; scene.add(terrainMesh);

  // Agua de los lagos (plano brillante encima)
  lakeZones.forEach(l=>{
    const lake = new THREE.Mesh(
      new THREE.CircleGeometry(1,48),
      new THREE.MeshPhongMaterial({color:0x1a7acc,shininess:120,transparent:true,opacity:0.82,reflectivity:1})
    );
    lake.rotation.x = -Math.PI/2;
    lake.scale.set(l.rx,1,l.rz);
    lake.position.set(l.x,-1.5,l.z);
    scene.add(lake);
  });

  // Pista
  const runway = new THREE.Mesh(
    new THREE.PlaneGeometry(12,160),
    new THREE.MeshPhongMaterial({color:0x555555})
  );
  runway.rotation.x = -Math.PI/2; runway.position.set(0,-0.9,-60); scene.add(runway);

  // Arboles
  function makeTree(x,z){
    const g = new THREE.Group();
    const trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.3,0.4,2,6),
      new THREE.MeshPhongMaterial({color:0x7a4a1a})
    );
    trunk.position.y = 0; g.add(trunk);
    [2.5,3.8,4.8].forEach((y,i)=>{
      const cone = new THREE.Mesh(
        new THREE.ConeGeometry(2.5-i*0.5,2.2,7),
        new THREE.MeshPhongMaterial({color:[0x2d7a1a,0x3a9a22,0x4ab830][i]})
      );
      cone.position.y = y; g.add(cone);
    });
    g.position.set(x,-1,z); scene.add(g);
  }
  // Árboles: lejos de lagos, ciudades y aeropuertos
  function isLakePos(x,z){
    for(const l of lakeZones){
      const dx=(x-l.x)/l.rx, dz=(z-l.z)/l.rz;
      if(dx*dx+dz*dz<1.4) return true;
    }
    return false;
  }
  const rawTrees = [
    // Alrededor del aeropuerto inicial (pero no sobre él)
    [-200,-80],[-220,-120],[-180,-100],[-240,-60],
    [200,-80],[220,-120],[180,-100],[240,-60],
    [-150,80],[-170,100],[150,80],[170,100],
    // Zona media
    [-300,-300],[-320,-280],[-280,-320],[-340,-260],
    [300,-300],[320,-280],[280,-320],[340,-260],
    [-150,-450],[-130,-480],[150,-450],[130,-480],
    [-400,-500],[-420,-480],[400,-500],[420,-480],
    // Zona lejana entre ciudades
    [-200,-650],[-180,-700],[200,-650],[180,-700],
    [-50,-600],[-80,-620],[50,-600],[80,-620],
    // Bordes
    [-500,-300],[-520,-280],[500,-300],[520,-280],
    [-600,-200],[-580,-220],[600,-200],[580,-220],
    [-400,-750],[-380,-780],[400,-750],[380,-780],
  ];
  rawTrees.forEach(([x,z])=>{ if(!isLakePos(x,z)) makeTree(x,z); });

  // ============================================================
  // AEROPUERTO INICIO (donde arranca el avión) x=0, z=0
  // ============================================================
  function makeHangar(x,z,w,d,h,color){
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshPhongMaterial({color}));
    body.position.y = h/2; g.add(body);
    const roof = new THREE.Mesh(
      new THREE.CylinderGeometry(w/2,w/2,d,12,1,false,0,Math.PI),
      new THREE.MeshPhongMaterial({color:0xaaaaaa})
    );
    roof.rotation.z=Math.PI/2; roof.rotation.y=Math.PI/2; roof.position.y=h; g.add(roof);
    g.position.set(x,-1,z); scene.add(g);
    return {x,z,w,d,h:h+w/2};
  }

  function makeAirport(ax, az, solid){
    // Pista
    const rw = new THREE.Mesh(new THREE.PlaneGeometry(20,300), new THREE.MeshPhongMaterial({color:0x444444}));
    rw.rotation.x=-Math.PI/2; rw.position.set(ax,-0.85,az); scene.add(rw);
    // Marcas
    for(let i=0;i<10;i++){
      const mk = new THREE.Mesh(new THREE.PlaneGeometry(1.5,18), new THREE.MeshPhongMaterial({color:0xffffff}));
      mk.rotation.x=-Math.PI/2; mk.position.set(ax,-0.84,az-120+i*26); scene.add(mk);
    }
    // Torre
    const tb = new THREE.Mesh(new THREE.BoxGeometry(6,30,6), new THREE.MeshPhongMaterial({color:0xdddddd}));
    tb.position.set(ax+25,14,az); scene.add(tb);
    const tt = new THREE.Mesh(new THREE.BoxGeometry(10,6,10), new THREE.MeshPhongMaterial({color:0x4488cc}));
    tt.position.set(ax+25,32,az); scene.add(tt);
    // Hangares
    solid.push(makeHangar(ax-35,az-30,28,22,12,0xbbbbaa));
    solid.push(makeHangar(ax-35,az+30,28,22,12,0xbbbbaa));
    // Pista sólida
    solid.push({x:ax,z:az,w:20,d:300,h:0.5});
    // Torre sólida
    solid.push({x:ax+25,z:az,w:6,d:6,h:36});
  }

  const solidBuildings = [];

  // Aeropuerto 0 — zona de inicio
  makeAirport(0, 0, solidBuildings);
  // Pista original de inicio
  solidBuildings.push({x:0,z:-60,w:12,d:160,h:0.5});

  // ============================================================
  // CIUDAD 1 + AEROPUERTO 1 (izquierda)
  // ============================================================
  // Ciudad 1: izquierda, aeropuerto a su lado derecho (no encima)
  const CX = -700, CZ = -1100;
  makeAirport(CX+200, CZ, solidBuildings); // aeropuerto a la derecha de la ciudad

  const buildingColors = [0x8899aa,0x99aabb,0x7788aa,0xaabbcc,0x667799,0x556688,0x99aabb];

  function makeBuilding(x,z,w,d,h){
    const g = new THREE.Group();
    // Cuerpo
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(w,h,d),
      new THREE.MeshPhongMaterial({color:buildingColors[Math.floor(Math.random()*buildingColors.length)]})
    );
    body.position.y = h/2;
    g.add(body);
    // Ventanas (plano con textura canvas)
    const wc = document.createElement('canvas');
    wc.width=64; wc.height=128;
    const wctx = wc.getContext('2d');
    wctx.fillStyle='#334455';
    wctx.fillRect(0,0,64,128);
    for(let wy=0;wy<8;wy++) for(let wx2=0;wx2<4;wx2++){
      wctx.fillStyle=Math.random()>0.3?'#ffee88':'#223344';
      wctx.fillRect(4+wx2*15,4+wy*15,10,10);
    }
    const wmat = new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(wc)});
    [0,1,2,3].forEach(side=>{
      const wp = new THREE.Mesh(new THREE.PlaneGeometry(w,h), wmat);
      wp.position.y = h/2;
      if(side===0){wp.position.z=d/2+0.1;}
      if(side===1){wp.position.z=-d/2-0.1;wp.rotation.y=Math.PI;}
      if(side===2){wp.position.x=w/2+0.1;wp.rotation.y=Math.PI/2;}
      if(side===3){wp.position.x=-w/2-0.1;wp.rotation.y=-Math.PI/2;}
      g.add(wp);
    });
    // Techo plano con borde
    const roof = new THREE.Mesh(
      new THREE.BoxGeometry(w+0.5,1,d+0.5),
      new THREE.MeshPhongMaterial({color:0x445566})
    );
    roof.position.y = h+0.5;
    g.add(roof);
    g.position.set(x,-1,z);
    scene.add(g);
    solidBuildings.push({x,z,w,d,h:h+2});
  }

  // Calles y bloques de ciudad
  const blockOffsets = [
    // Bloque 1
    [10,10,14,14,25],[10,35,14,14,18],[10,60,14,14,30],
    [35,10,14,14,20],[35,35,14,14,35],[35,60,14,14,15],
    // Bloque 2
    [-15,10,14,14,22],[-15,35,14,14,28],[-15,60,14,14,18],
    [-40,10,14,14,32],[-40,35,14,14,20],[-40,60,14,14,25],
    // Bloque 3
    [10,-20,14,14,18],[35,-20,14,14,24],[-15,-20,14,14,30],[-40,-20,14,14,16],
    [10,-50,14,14,28],[35,-50,14,14,20],[-15,-50,14,14,22],[-40,-50,14,14,35],
    // Edificios grandes centrales
    [60,25,20,20,45],[60,-10,18,18,38],[60,55,16,16,30],
    [-65,25,20,20,40],[-65,-10,18,18,35],[-65,55,16,16,28],
  ];
  blockOffsets.forEach(([ox,oz,w,d,h])=>makeBuilding(CX+ox, CZ+oz, w,d,h));

  // Calles ciudad 1
  const streetMat = new THREE.MeshPhongMaterial({color:0x555566});
  [[CX,CZ,120,8],[CX,CZ,8,160]].forEach(([x,z,w,d])=>{
    const s = new THREE.Mesh(new THREE.PlaneGeometry(w,d), streetMat);
    s.rotation.x=-Math.PI/2; s.position.set(x,-0.88,z); scene.add(s);
  });

  // ============================================================
  // CIUDAD 2 + AEROPUERTO 2 (derecha)
  // ============================================================
  // Ciudad 2: derecha, aeropuerto a su lado izquierdo
  const CX2 = 700, CZ2 = -1100;
  makeAirport(CX2-200, CZ2, solidBuildings); // aeropuerto a la izquierda de la ciudad
  const b2Offsets = [
    [10,10,14,14,28],[10,35,14,14,20],[10,60,14,14,33],
    [35,10,14,14,18],[35,35,14,14,38],[35,60,14,14,22],
    [-15,10,14,14,25],[-15,35,14,14,15],[-15,60,14,14,30],
    [-40,10,14,14,35],[-40,35,14,14,22],[-40,60,14,14,18],
    [10,-20,14,14,20],[35,-20,14,14,28],[-15,-20,14,14,25],[-40,-20,14,14,32],
    [60,25,20,20,42],[60,-10,18,18,35],[-65,25,20,20,38],[-65,-10,18,18,30],
  ];
  b2Offsets.forEach(([ox,oz,w,d,h])=>makeBuilding(CX2+ox, CZ2+oz, w,d,h));
  [[CX2,CZ2,120,8],[CX2,CZ2,8,160]].forEach(([x,z,w,d])=>{
    const s = new THREE.Mesh(new THREE.PlaneGeometry(w,d), streetMat);
    s.rotation.x=-Math.PI/2; s.position.set(x,-0.88,z); scene.add(s);
  });

  // Guardar solidBuildings en window para colision
  // Pista aeropuerto sólida (para que el avión aterrice encima)
  // Calles ciudad 2
  [[CX2,CZ2,120,8],[CX2,CZ2,8,160]].forEach(([x,z,w,d])=>{
    const s = new THREE.Mesh(new THREE.PlaneGeometry(w,d), streetMat);
    s.rotation.x=-Math.PI/2; s.position.set(x,-0.88,z); scene.add(s);
  });

  window._solidBuildings = solidBuildings;

  // ============ NUBES
  function cloud(x,y,z){
    const g=new THREE.Group();
    const m=new THREE.MeshPhongMaterial({color:0xffffff,transparent:true,opacity:0.9});

  function setThrottleFromY(clientY){
    const rect = track.getBoundingClientRect();
    const trackH = rect.height - 28; // alto útil
    const y = Math.max(0, Math.min(trackH, rect.bottom - 14 - clientY));
    state.throttle = y / trackH;

  }

  function updateThrottleHandle(){
    const trackH = track.clientHeight - 28;
    const pos = state.throttle * trackH;
    handle.style.bottom = (4 + pos) + 'px';
    const pct = Math.round(state.throttle * 100);
    pctEl.textContent = pct + '%';
    // Color de la palanca según potencia
    if(pct < 50)       handle.style.background = 'linear-gradient(135deg,#4a8,#2a5)';
    else if(pct < 80)  handle.style.background = 'linear-gradient(135deg,#ca4,#863)';
    else               handle.style.background = 'linear-gradient(135deg,#e44,#922)';
  }

  track.addEventListener('mousedown', e=>{ dragging=true; setThrottleFromY(e.clientY); e.preventDefault(); });
  window.addEventListener('mousemove', e=>{ if(dragging) setThrottleFromY(e.clientY); });
  window.addEventListener('mouseup',   ()=>{ dragging=false; });

  function getTerrainHeight(wx, wz){
    for(const l of lakeZones){
      const dx=(wx-l.x)/l.rx, dz=(wz-l.z)/l.rz;
      if(dx*dx+dz*dz < 1.0) return -2.5;
    }
    if(Math.abs(wx)<250   && wz>-220  && wz<220)   return -1;
    if(Math.abs(wx+700)<280 && wz>-1280 && wz<-880) return -1;
    if(Math.abs(wx-700)<280 && wz>-1280 && wz<-880) return -1;
    // Resto: terreno con montañas
    let mh = mountainHeight(wx,wz);
    let nh = noise(wx,wz,0.008,8) + noise(wx,wz,0.02,3);
    return mh + nh - 1;
  }

function animate(){
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    // Throttle
    if(state.crashed) return;
    if(keys['w']||keys['W']) state.throttle=Math.min(1,state.throttle+dt*1.5);
    if(keys['s']||keys['S']) state.throttle=Math.max(0,state.throttle-dt*1.5);

    if(state.fuel>0){
      state.fuel=Math.max(0,state.fuel-state.throttle*dt*0.8);
    }else{
      state.throttle=0;
    }
    // Girar
    if(keys['ArrowLeft'])  state.yaw+=dt*1.8;
    if(keys['ArrowRight']) state.yaw-=dt*1.8;

    // Cabeceo: ↓ = morro SUBE, ↑ = morro BAJA
    if(keys['ArrowDown']) state.pitch=Math.max(-0.45, state.pitch-dt*0.7);
    if(keys['ArrowUp'])   state.pitch=Math.min(0.40,  state.pitch+dt*0.7);

    // Velocidad
    const targetSpeed = state.throttle * 1000;
    state.speed += (targetSpeed - state.speed) * dt * 3.5;

    // Fisica de vuelo
    const inAir = state.altitude > 1.5;
    const liftFactor = Math.min(1, Math.max(0, state.speed / 75));
    const pitchLift  = Math.sin(-state.pitch) * state.speed * 0.05 * liftFactor;

    // Cuanto falta de sustentación → cuánto cae
    const sinkRate = 2.5 * (1 - liftFactor) * dt;
    state.altitude += pitchLift * dt - sinkRate;

    // PLANEO: por cada metro que cae, avanza horizontalmente
    // La relación de planeo (glide ratio) es 1:1 — cae 1m, avanza 1m
    // Esto se suma al movimiento del motor
    if(inAir && sinkRate > 0){
      const glideForward = sinkRate * 7.0; // 1:7 ratio — cae 1m, avanza 7m
      const gfwd = new THREE.Vector3(0,0,-1);
      gfwd.applyEuler(new THREE.Euler(0, state.yaw, 0));
      plane.position.addScaledVector(gfwd, glideForward);
    }

    // Colision con terreno real
    // Velocidad vertical (metros/seg negativos = bajando)
    const vertSpeed = (state.altitude - state.prevAlt) / dt;
    state.prevAlt = state.altitude;

    const groundH = getTerrainHeight(plane.position.x, plane.position.z) + 1.5;

    // CRASH si toca el suelo/montaña bajando muy rápido
    if(state.altitude <= groundH + 0.1 && vertSpeed < -8){
      // Impacto fuerte contra el suelo o ladera de montaña
      state.crashed = true;
      state.speed = 0; state.throttle = 0; state.pitch = 0; state.fuel = 0;
      const cs = document.getElementById('crash-screen');
      if(cs){ cs.style.display='flex'; }
    }

    state.altitude = Math.max(groundH, state.altitude);

    // Colision con edificios y estructuras
    if(window._solidBuildings){
      for(const b of window._solidBuildings){
        const dx = Math.abs(plane.position.x - b.x);
        const dz = Math.abs(plane.position.z - b.z);
        const hw = (b.w||15)/2+2, hd = (b.d||15)/2+2;
        if(dx < hw && dz < hd){
          const topH = b.h||20;
          if(state.altitude < topH + 0.5){
            if(topH < 2){
              // Pista: requiere aterrizaje suave
              if(vertSpeed < -7){
                state.crashed = true;
                state.speed = 0;
                state.throttle = 0;
                state.fuel = 0;
                const cs = document.getElementById('crash-screen');
                if(cs){ cs.style.display='flex'; }
              } else {
                state.altitude = topH + 0.5;

                if(vertSpeed < -3){
                  if(msgEl) msgEl.textContent='⚠ ATERRIZAJE DURO';
                  state.speed *= 0.75;
                } else {
                  if(msgEl) msgEl.textContent='🛬 ATERRIZAJE SUAVE';
                }

                if(state.altitude <= 1.5){
                  state.speed = Math.max(0, state.speed - dt*120);
                }
              }
            } else {
              // Edificio/estructura — CRASH si va rápido
              if(state.speed > 80){
                state.crashed = true;
                state.speed = 0;
                state.throttle = 0;
                state.pitch = 0;
                state.fuel = 0;
                const cs = document.getElementById('crash-screen');
                if(cs){ cs.style.display='flex'; }
              } else {
                state.altitude = topH + 0.5;
                state.speed *= 0.2;
                state.pitch = 0;
              }
            }
          }
        }
      }
    }

    // Movimiento del motor hacia adelante
    const forward = new THREE.Vector3(0,0,-1);
    forward.applyEuler(new THREE.Euler(0, state.yaw, 0));
    plane.position.addScaledVector(forward, state.speed * dt * 0.014);
    plane.position.y = state.altitude;

    // Rotacion visual: pitch negativo = morro arriba
    plane.rotation.set(
      -state.pitch,
      state.yaw,
      keys['ArrowLeft'] ? 0.22 : keys['ArrowRight'] ? -0.22 : 0,
      'YXZ'
    );

    // Helice gira
    propGroup.rotation.z += dt*(6+state.throttle*35);
    // Actualizar palanca visual cada frame (para W/S del teclado)
    updateThrottleHandle();

    // Camara detras
    const back = forward.clone().multiplyScalar(-16);
    const camPos = plane.position.clone().add(back).add(new THREE.Vector3(0,5,0));
    camera.position.lerp(camPos, 0.08);
    camera.lookAt(plane.position.clone().add(new THREE.Vector3(0,1.5,0)));
 camera.fov = 65 + state.speed * 0.015;
 camera.updateProjectionMatrix();

    spdEl.textContent = Math.round(state.speed);
    altEl.textContent = Math.round(Math.max(0,(state.altitude-0.5)*10));

    
    const airports=[{x:0,z:0},{x:-500,z:-1100},{x:500,z:-1100}];
    let rep=false;

    for(const a of airports){
      const d=Math.hypot(plane.position.x-a.x,plane.position.z-a.z);

      // cerca de pista + prácticamente detenido + en suelo
      if(d<140 && state.speed<5 && state.altitude<3){
        state.fuel=Math.min(100,state.fuel+25*dt);
        rep=true;
      }
    }

    fuelEl.textContent='Combustible: '+Math.round(state.fuel)+'%';

    if(rep){
      msgEl.textContent='⛽ REPOSTANDO...';
    }else if(state.fuel<15){
      msgEl.textContent='⚠ COMBUSTIBLE BAJO';
    }else{
      msgEl.textContent='';
    }

    rctx.clearRect(0,0,180,180);
    rctx.strokeStyle='#00ff66';
    rctx.beginPath();
    rctx.arc(90,90,85,0,Math.PI*2);
    rctx.stroke();

    const scale=.05;
    function mark(x,z,c){
      const dx=(x-plane.position.x)*scale;
      const dz=(z-plane.position.z)*scale;
      if(Math.hypot(dx,dz)<80){
        rctx.fillStyle=c;
        rctx.beginPath();
        rctx.arc(90+dx,90+dz,4,0,6.28);
        rctx.fill();
      }
    }

    mark(0,0,'yellow');
    mark(-500,-1100,'yellow');
    mark(500,-1100,'yellow');

    rctx.fillStyle='red';
    rctx.beginPath();
    rctx.arc(90,90,5,0,6.28);
    rctx.fill();

    
    // Mensaje de estado de vuelo
    if(typeof msgEl !== 'undefined' && msgEl.style.color !== 'rgb(255, 68, 68)'){
      if(state.fuel <= 0 && state.altitude > 3){
        msgEl.style.color='#ffcc00';
        msgEl.textContent = '✈ PLANEANDO — motor apagado';
      } else if(state.throttle < 0.05 && state.altitude > 5 && state.speed > 30){
        msgEl.style.color='#88ccff';
        msgEl.textContent = '🪂 Planeando con inercia';
      } else {
        msgEl.textContent = '';
      }
    }

    
    if(gctx){
      gctx.clearRect(0,0,260,140);
      gctx.strokeStyle='white';

      // Velocímetro circular
      gctx.beginPath();
      gctx.arc(70,75,45,0,Math.PI*2);
      gctx.stroke();
      gctx.fillStyle='white';
      gctx.fillText('VEL',58,20);

      const sp=Math.min(800, state.speed||0);
      const ang=(-140 + (sp/800)*280) * Math.PI/180;
      gctx.beginPath();
      gctx.moveTo(70,75);
      gctx.lineTo(70+35*Math.cos(ang),75+35*Math.sin(ang));
      gctx.stroke();

      gctx.fillText(Math.round(sp)+' km/h',40,132);

      // Altímetro vertical
      gctx.strokeRect(170,20,25,95);
      const alt=Math.max(0,Math.min(1000,state.altitude||0));
      const y=115-(alt/1000)*95;
      gctx.fillRect(170,y,25,4);
      gctx.fillText('ALT',165,15);
      gctx.fillText(Math.round(alt)+'m',150,132);

      // Fuel bar inferior
      if(typeof state.fuel!=='undefined'){
        const fuel=Math.max(0,Math.min(100,state.fuel));

        gctx.fillStyle='white';
        gctx.fillText('FUEL',20,160);

        gctx.strokeRect(60,150,120,12);

        const w=(fuel/100)*120;

        if(fuel>50){
          gctx.fillStyle='#00ff66';
        }else if(fuel>20){
          gctx.fillStyle='#ffcc00';
        }else{
          gctx.fillStyle='#ff4444';
        }

        gctx.fillRect(60,150,w,12);

        gctx.fillStyle='white';
        gctx.fillText(Math.round(fuel)+'%',190,160);
      }
    }

    renderer.render(scene, camera);
  }
  animate();
});
